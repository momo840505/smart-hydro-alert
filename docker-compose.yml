services:
  mongo:
    image: mongo:7
    container_name: smartwater-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartwater-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t healthcheck -E -W 2 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
    container_name: smartwater-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      LOG_LEVEL: "INFO"
      MONGO_URI: "mongodb://mongo:27017"
      MONGO_DB: "smart_water"
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
      MQTT_CLIENT_ID: "fastapi-backend"
      ALERT_DURATION_THRESHOLD_SEC: "300"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - ./app:/app/app
      - ./simulator:/app/simulator
    depends_on:
      mongo:
        condition: service_healthy
      mosquitto:
        condition: service_started
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: nginx:alpine
    container_name: smartwater-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend-react/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  simulator:
    build:
      context: .
    profiles: ["tools"]
    environment:
      MQTT_HOST: "mosquitto"
      MQTT_PORT: "1883"
    volumes:
      - ./simulator:/app/simulator
    depends_on:
      mosquitto:
        condition: service_started
    entrypoint: ["python", "-m", "simulator"]

volumes:
  mongo_data:
  mosquitto_data:
  mosquitto_log: