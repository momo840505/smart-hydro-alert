[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".conda"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "W"]
ignore = ["E501"]

[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
  \.conda
)/
'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
